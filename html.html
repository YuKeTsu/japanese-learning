<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
<div class="container">
    <div class="tab-container">
        <button id="tabVocab" class="tab-btn active">单词听写</button>
        <button id="tabExercise" class="tab-btn">专项练习</button>
    </div>

    <div class="select-group">
        <div id="vocabControls">
            <div class="multiselect-container" id="vocabMultiSelect">
                <div class="multiselect-header" id="multiselectHeader">选课</div>
                <div class="multiselect-dropdown" id="multiselectDropdown">
                    <label class="multiselect-option">
                        <input type="checkbox" id="selectAll"> 
                        <strong>全选</strong>
                    </label>
                    <div class="multiselect-divider"></div>
                    <label class="multiselect-option"><input type="checkbox" value="lesson_1" class="lesson-chk"> 第1课单词</label>
                    <label class="multiselect-option"><input type="checkbox" value="lesson_2" class="lesson-chk"> 第2课单词</label>
                    <label class="multiselect-option"><input type="checkbox" value="lesson_3" class="lesson-chk"> 第3课单词</label>
                    <label class="multiselect-option"><input type="checkbox" value="lesson_4" class="lesson-chk"> 第4课单词</label>
                    <label class="multiselect-option"><input type="checkbox" value="numbers_100" class="lesson-chk"> 百以内数字</label>
                    <label class="multiselect-option"><input type="checkbox" value="numbers_over_100" class="lesson-chk"> 百以外数字</label>
                    <label class="multiselect-option"><input type="checkbox" value="culture_geo" class="lesson-chk"> 国、人、语、大陆</label>
                    <label class="multiselect-option"><input type="checkbox" value="week_days" class="lesson-chk"> 星期~</label>
                  <label class="multiselect-option"><input type="checkbox" value="hours" class="lesson-chk"> 小时</label>
                  <label class="multiselect-option"><input type="checkbox" value="minutes" class="lesson-chk"> 分钟</label>
                  <label class="multiselect-option"><input type="checkbox" value="time_terms" class="lesson-chk"> 时间词汇</label>
                </div>
            </div>
            
            <label class="random-label">
                <input type="checkbox" id="randomMode" checked>乱序
            </label>
            <label class="random-label">
                <input type="checkbox" id="reverseMode">反向（汉字→中文）
            </label>
        </div>

        <div id="exerciseControls" style="display: none;">
            <select id="exerciseSelect">
                <option value="random_num">随机数(0-9亿)</option>
            </select>
            <label class="random-label">
                <input type="checkbox" id="exerciseReverse">反向（假名→数字）
            </label>
        </div>

        <div class="global-controls">
            <label class="random-label">
                <input type="checkbox" id="showKanji" checked>显示汉字
            </label>
        </div>
    </div>

    <div class="quiz-box">
        <div id="progress"></div>
        <div id="stats"></div>
        <div id="question">请点击底部【开始】按钮</div>
        <div id="kanjiDisplay"></div>
    </div>

    <textarea id="answer" placeholder="请输入假名..." rows="3"></textarea>
    <div class="hint">按 Enter 提交</div>
    <div id="result"></div>
  
    <div class="button-row">
      <button id="nextBtn">开始</button>
      <button id="checkBtn">检查</button>
    </div>
</div>
